project_id = "brasov-ukrainian-app"

[api]
enabled = true
port = 54321
schemas = ["public", "storage", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[studio]
enabled = true
port = 54323
api_url = "http://localhost"

[inbucket]
enabled = true
port = 54324

[storage]
enabled = true
file_size_limit = "50MiB"

[auth]
enabled = true
site_url = "http://localhost:3000"
additional_redirect_urls = ["https://localhost:3000"]
jwt_expiry = 3600
enable_signup = true

# Edge functions — no JWT verification (they validate Telegram initData themselves)
[functions.auth-telegram]
verify_jwt = false

[functions.check-membership]
verify_jwt = false

[functions.send-bot-notification]
verify_jwt = false

[functions.web-push-send]
verify_jwt = false

[functions.create-checkout-session]
verify_jwt = false

[functions.stripe-webhook]
verify_jwt = false

[functions.create-stars-invoice]
verify_jwt = false

[functions.telegram-webhook]
verify_jwt = false
